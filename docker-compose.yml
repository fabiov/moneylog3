services:
    db:
        image: mysql:9.0
        restart: always
        environment:
            MYSQL_DATABASE: moneylog
            MYSQL_USER: moneylog
            MYSQL_PASSWORD: moneylog_password
            MYSQL_ROOT_PASSWORD: root_password
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
volumes:
    mysql_data:
        driver: local